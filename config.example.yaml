# Cyberpunk 2077 模组管理器 配置文件
# 复制为 config.yaml 并填入配置，或在前端「设置」页填写

# 数据存放目录（必填，无默认值）
data_dir: "D:/CyberpunkModManager/data"

# Cyberpunk 2077 游戏安装根目录
game_path: "D:\\Program Files (x86)\\Steam\\steamapps\\common\\Cyberpunk 2077"

# Nexus Mods API Key
nexus_api_key: "你的 Nexus API Key"

# LLM 配置
openai_api_key: "你的 LLM API Key"
model_name: "gpt-4o-mini"
openai_base_url: "https://api.openai.com/v1"
